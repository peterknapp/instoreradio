<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 170px;
      }
      .controls {
        padding: 12px 0 10px 0;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .controls .btn {
        line-height: 1.3;
        padding-top: 8px;
        padding-bottom: 8px;
      }
      .log-box {
        margin-top: 8px;
        border: 1px solid #d8d8d8;
        border-radius: 4px;
        background: #fafafa;
      }
      .log-head {
        font-weight: 600;
        padding: 8px 10px;
        border-bottom: 1px solid #e6e6e6;
      }
      .log-body {
        max-height: 180px;
        overflow: auto;
        padding: 8px 10px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <button id="start" class="btn btn-success">Start</button>
      <button id="stop" class="btn btn-danger">Stop</button>
    </div>

    <div class="log-box">
      <div class="log-head">Playback Hinweise</div>
      <div id="playback-log" class="log-body">Playback-Events bitte im Device-Log mit Filter <code>[PLAYBACK]</code> ansehen.</div>
    </div>

    <script src="hosted.js"></script>
    <script>
      ib.setDefaultStyle();

      function send(path) {
        ib.sendCommand(path, "");
      }

      document.getElementById("start").addEventListener("click", function() {
        send("player/start");
      });

      document.getElementById("stop").addEventListener("click", function() {
        send("player/stop");
      });
    </script>
  </body>
</html>
