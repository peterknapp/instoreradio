<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 110px;
      }
      .controls {
        padding: 12px 0 14px 0;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .controls .btn {
        line-height: 1.3;
        padding-top: 8px;
        padding-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <button id="start" class="btn btn-success">Start</button>
      <button id="stop" class="btn btn-danger">Stop</button>
    </div>

    <script src="hosted.js"></script>
    <script>
      ib.setDefaultStyle();

      document.getElementById("start").addEventListener("click", function() {
        ib.sendCommand("player/start", "");
      });

      document.getElementById("stop").addEventListener("click", function() {
        ib.sendCommand("player/stop", "");
      });

    </script>
  </body>
</html>
